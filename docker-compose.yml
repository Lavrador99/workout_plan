services:
  # ── NestJS API ─────────────────────────────────────────────────────────
  api-node:
    container_name: treino-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./docker/api-node/Dockerfile
    ports:
      - "3334:3334"
    environment:
      - PORT=3334
      - ALLOWED_ORIGIN=http://localhost:5173
      - NODE_ENV=production
      - SNAPSHOT_PATH=/data/treino_autosave.json
    volumes:
      # Persist the snapshot JSON outside the container
      - ./docker/data:/data
    develop:
      watch:
        - action: sync
          path: ./apps/treino-api
          target: /app/apps/treino-api
          ignore:
            - ./apps/treino-api/tsconfig.*
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./apps/treino-api/tsconfig.*

